<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#c8f55a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="circle1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8f55a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c8f55a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="120" r="220" fill="url(#circle1)"/>
  <circle cx="200" cy="560" r="160" fill="url(#circle1)"/>

  <!-- Grid lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="68" height="68" rx="16" fill="#141414" stroke="rgba(200,245,90,0.2)" stroke-width="1"/>
  <text x="114" y="132" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#c8f55a" text-anchor="middle">S</text>

  <!-- Brand name -->
  <text x="80" y="320" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#f0ede8" letter-spacing="-2">Shop</text>
  <text x="310" y="320" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#c8f55a" letter-spacing="-2">Your</text>
  <text x="524" y="320" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#f0ede8" letter-spacing="-2">Agent</text>

  <!-- Tagline -->
  <text x="80" y="384" font-family="Arial, sans-serif" font-size="26" fill="#888888">Il marketplace italiano degli agenti AI</text>

  <!-- Feature pills -->
  <rect x="80" y="430" width="196" height="36" rx="18" fill="rgba(200,245,90,0.08)" stroke="rgba(200,245,90,0.2)" stroke-width="1"/>
  <text x="178" y="453" font-family="Arial, sans-serif" font-size="14" fill="#c8f55a" text-anchor="middle">✓ Pronti all'uso</text>

  <rect x="292" y="430" width="200" height="36" rx="18" fill="rgba(200,245,90,0.08)" stroke="rgba(200,245,90,0.2)" stroke-width="1"/>
  <text x="392" y="453" font-family="Arial, sans-serif" font-size="14" fill="#c8f55a" text-anchor="middle">✓ Nessun codice</text>

  <rect x="508" y="430" width="248" height="36" rx="18" fill="rgba(200,245,90,0.08)" stroke="rgba(200,245,90,0.2)" stroke-width="1"/>
  <text x="632" y="453" font-family="Arial, sans-serif" font-size="14" fill="#c8f55a" text-anchor="middle">✓ Attivazione in 5 min</text>

  <!-- Domain -->
  <text x="80" y="556" font-family="Arial, sans-serif" font-size="16" fill="#555555">shopyouragent.onrender.com</text>
</svg>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostazioni — Shop Your Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0ede8; --muted: #888; --accent: #c8f55a; --accent-dark: #9ec43a;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    --error: #ff5f5f; --success: #5fff9a;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; }

  .sidebar {
    width: 240px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); padding: 1.5rem;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  }
  .logo { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--text); text-decoration: none; margin-bottom: 2.5rem; display: block; }
  .logo span { color: var(--accent); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: var(--muted); font-size: 14px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; text-decoration: none; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(200,245,90,0.1); color: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; }
  .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }
  .avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #0a0a0a; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-email { font-size: 11px; color: var(--muted); }
  .logout-btn { font-size: 12px; color: var(--muted); cursor: pointer; margin-top: 8px; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; display: block; text-align: center; border: 1px solid var(--border); }
  .logout-btn:hover { color: var(--text); border-color: var(--border2); }

  .main { margin-left: 240px; flex: 1; padding: 2.5rem; max-width: calc(100% - 240px); }
  .page-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 2.5rem; }

  .settings-block { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; max-width: 600px; }
  .block-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  input:disabled { opacity: 0.5; cursor: not-allowed; }
  input::placeholder { color: #555; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-save { background: var(--accent); color: #0a0a0a; font-family: var(--font-body); font-size: 14px; font-weight: 500; padding: 11px 24px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .btn-save:hover { background: var(--accent-dark); }
  .btn-save:disabled { opacity: 0.65; cursor: not-allowed; }
  .info-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--muted); font-size: 13px; }
  .info-val { font-weight: 500; }
  .role-chip { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: rgba(200,245,90,0.1); color: var(--accent); border: 1px solid rgba(200,245,90,0.2); }

  .danger-zone { border-color: rgba(255,95,95,0.2); }
  .danger-zone .block-title { color: var(--error); }
  .btn-danger { background: transparent; color: var(--error); font-family: var(--font-body); font-size: 14px; font-weight: 500; padding: 11px 24px; border: 1px solid rgba(255,95,95,0.3); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .btn-danger:hover { background: rgba(255,95,95,0.1); }

  @media (max-width: 768px) {
    .main { margin-left: 0; padding: 1.5rem; max-width: 100%; }
    .field-row { grid-template-columns: 1fr; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sya.js"></script>
</head>
<body>

<div class="sidebar">
  <a href="shop_your_agent.html" class="logo">Shop<span>Your</span>Agent</a>
  <a class="nav-item" id="nav-dashboard" href="#">
    <span class="nav-icon">←</span> Dashboard
  </a>
  <a class="nav-item active" href="impostazioni.html">
    <span class="nav-icon">⚙️</span> Impostazioni
  </a>
  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="avatar" id="avatar-initials">?</div>
      <div>
        <div class="user-name" id="user-name">Caricamento...</div>
        <div class="user-email" id="user-email"></div>
      </div>
    </div>
    <a class="logout-btn" onclick="signOut()">Esci</a>
  </div>
</div>

<div class="main">
  <div class="page-title">Impostazioni</div>
  <div class="page-sub">Gestisci il tuo account e le preferenze</div>

  <!-- INFO ACCOUNT -->
  <div class="settings-block">
    <div class="block-title">Informazioni account</div>
    <div class="info-row">
      <span class="info-label">Email</span>
      <span class="info-val" id="info-email">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Ruolo</span>
      <span id="info-role"><span class="role-chip">Acquirente</span></span>
    </div>
    <div class="info-row">
      <span class="info-label">Account creato</span>
      <span class="info-val" id="info-created">—</span>
    </div>
  </div>

  <!-- PROFILO -->
  <div class="settings-block">
    <div class="block-title">Profilo</div>
    <div class="field-row">
      <div class="field"><label>Nome</label><input type="text" id="s-nome" placeholder="Mario"></div>
      <div class="field"><label>Cognome</label><input type="text" id="s-cognome" placeholder="Rossi"></div>
    </div>
    <button class="btn-save" id="btn-profile" onclick="saveProfile()">Salva profilo</button>
  </div>

  <!-- PASSWORD -->
  <div class="settings-block">
    <div class="block-title">Sicurezza</div>
    <div class="field"><label>Nuova password</label><input type="password" id="s-pwd" placeholder="Minimo 8 caratteri"></div>
    <div class="field"><label>Conferma password</label><input type="password" id="s-pwd2" placeholder="Ripeti la nuova password"></div>
    <button class="btn-save" id="btn-pwd" onclick="savePassword()">Aggiorna password</button>
  </div>

  <!-- DANGER ZONE -->
  <div class="settings-block danger-zone">
    <div class="block-title">Zona pericolosa</div>
    <p style="font-size:14px; color:var(--muted); margin-bottom:1.25rem;">Disconnetti tutti i dispositivi o elimina il tuo account.</p>
    <button class="btn-danger" onclick="signOut()">Esci da tutti i dispositivi</button>
  </div>
</div>

<script>
  async function init() {
    const session = await requireAuth();
    if (!session) return;

    const user = session.user;
    const email = user.email || '';
    const role = user.user_metadata?.role || 'buyer';

    document.getElementById('info-email').textContent = email;
    document.getElementById('user-email').textContent = email;
    document.getElementById('avatar-initials').textContent = email.charAt(0).toUpperCase();
    document.getElementById('info-created').textContent = new Date(user.created_at).toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
    document.getElementById('info-role').innerHTML = `<span class="role-chip">${role === 'vendor' ? 'Sviluppatore' : role === 'admin' ? 'Admin' : 'Acquirente'}</span>`;

    const dashHref = role === 'vendor' ? 'dashboard-vendor.html' : role === 'admin' ? 'admin.html' : 'dashboard-utente.html';
    document.getElementById('nav-dashboard').href = dashHref;

    const { data: profiles } = await db.from('profiles').select('nome, cognome').eq('user_id', user.id).limit(1);
    if (profiles?.[0]) {
      document.getElementById('s-nome').value = profiles[0].nome || '';
      document.getElementById('s-cognome').value = profiles[0].cognome || '';
      document.getElementById('user-name').textContent = `${profiles[0].nome} ${profiles[0].cognome}`;
      document.getElementById('avatar-initials').textContent = profiles[0].nome?.charAt(0).toUpperCase() || email.charAt(0).toUpperCase();
    } else {
      const meta = user.user_metadata || {};
      if (meta.nome) {
        document.getElementById('s-nome').value = meta.nome;
        document.getElementById('s-cognome').value = meta.cognome || '';
        document.getElementById('user-name').textContent = `${meta.nome} ${meta.cognome || ''}`.trim();
        document.getElementById('avatar-initials').textContent = meta.nome.charAt(0).toUpperCase();
      }
    }
  }

  async function saveProfile() {
    const nome = document.getElementById('s-nome').value.trim();
    const cognome = document.getElementById('s-cognome').value.trim();
    if (!nome || !cognome) { showToast('Inserisci nome e cognome', 'error'); return; }

    const btn = document.getElementById('btn-profile');
    setBtnLoading(btn, true, 'Salva profilo');

    const { data: { session } } = await db.auth.getSession();
    const userId = session.user.id;

    const { error } = await db.from('profiles').upsert({ user_id: userId, nome, cognome }, { onConflict: 'user_id' });
    await db.auth.updateUser({ data: { nome, cognome } });

    setBtnLoading(btn, false, 'Salva profilo');

    if (error) { showToast('Errore: ' + error.message, 'error'); return; }

    showToast('Profilo aggiornato!', 'success');
    document.getElementById('user-name').textContent = `${nome} ${cognome}`;
    document.getElementById('avatar-initials').textContent = nome.charAt(0).toUpperCase();
  }

  async function savePassword() {
    const pwd = document.getElementById('s-pwd').value;
    const pwd2 = document.getElementById('s-pwd2').value;

    if (!pwd || !pwd2) { showToast('Compila entrambi i campi', 'error'); return; }
    if (pwd !== pwd2) { showToast('Le password non corrispondono', 'error'); return; }
    if (pwd.length < 8) { showToast('La password deve essere di almeno 8 caratteri', 'error'); return; }

    const btn = document.getElementById('btn-pwd');
    setBtnLoading(btn, true, 'Aggiorna password');

    const { error } = await db.auth.updateUser({ password: pwd });

    setBtnLoading(btn, false, 'Aggiorna password');

    if (error) { showToast(translateAuthError(error.message), 'error'); return; }

    showToast('Password aggiornata con successo!', 'success');
    document.getElementById('s-pwd').value = '';
    document.getElementById('s-pwd2').value = '';
  }

  init();
</script>
</body>
</html>

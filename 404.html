<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Pagina non trovata — Shop Your Agent</title>
<meta name="description" content="La pagina che stai cercando non esiste.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23141414'/%3E%3Ctext x='16' y='23' font-family='Arial Black,sans-serif' font-size='17' font-weight='900' fill='%23c8f55a' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0ede8; --muted: #888; --accent: #c8f55a; --accent-dark: #9ec43a;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 2rem;
  }
  .container { max-width: 480px; }
  .error-code {
    font-family: var(--font-display); font-size: clamp(80px, 18vw, 160px);
    font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -4px;
    opacity: 0.15; margin-bottom: -1rem; user-select: none;
  }
  .error-title {
    font-family: var(--font-display); font-size: clamp(24px, 5vw, 36px);
    font-weight: 700; letter-spacing: -0.5px; margin-bottom: 1rem;
  }
  .error-sub {
    font-size: 16px; color: var(--muted); line-height: 1.7;
    font-weight: 300; margin-bottom: 2.5rem;
  }
  .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-main {
    background: var(--accent); color: #0a0a0a; font-family: var(--font-body);
    font-size: 14px; font-weight: 500; padding: 12px 24px; border: none;
    border-radius: 8px; cursor: pointer; text-decoration: none; transition: all 0.2s;
  }
  .btn-main:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--text); font-family: var(--font-body);
    font-size: 14px; font-weight: 400; padding: 12px 24px;
    border: 1px solid var(--border2); border-radius: 8px;
    cursor: pointer; text-decoration: none; transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.04); }
  .logo {
    position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
    font-family: var(--font-display); font-size: 16px; font-weight: 800;
    color: var(--text); text-decoration: none; white-space: nowrap;
  }
  .logo span { color: var(--accent); }
</style>
</head>
<body>
<noscript><div style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#ff5f5f;color:#fff;text-align:center;padding:12px 1rem;font-family:sans-serif;font-size:14px;font-weight:500;">Questo sito richiede JavaScript. Attivalo nel browser per continuare.</div></noscript>
<a href="index.html" class="logo">Shop<span>Your</span>Agent</a>
<div class="container">
  <div class="error-code">404</div>
  <div class="error-title">Pagina non trovata</div>
  <p class="error-sub">
    La pagina che stai cercando non esiste o è stata spostata.<br>
    Torna alla home e continua a esplorare il catalogo.
  </p>
  <div class="btn-group">
    <a href="index.html" class="btn-main">Torna alla home</a>
    <a href="shop_your_agent.html" class="btn-ghost">Esplora il catalogo →</a>
  </div>
</div>
</body>
</html>

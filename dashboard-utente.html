<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Shop Your Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0ede8; --muted: #888; --accent: #c8f55a; --accent-dark: #9ec43a;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    --error: #ff5f5f; --success: #5fff9a;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; }

  .sidebar {
    width: 240px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); padding: 1.5rem;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  }
  .logo { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--text); text-decoration: none; margin-bottom: 2.5rem; display: block; }
  .logo span { color: var(--accent); }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; color: var(--muted); font-size: 14px; font-weight: 400;
    cursor: pointer; transition: all 0.2s; margin-bottom: 4px; text-decoration: none;
    border: none; background: none; font-family: var(--font-body); width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(200,245,90,0.1); color: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; }
  .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }
  .avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #0a0a0a; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-email { font-size: 11px; color: var(--muted); }
  .logout-btn { font-size: 12px; color: var(--muted); cursor: pointer; margin-top: 8px; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; display: block; text-align: center; border: 1px solid var(--border); }
  .logout-btn:hover { color: var(--text); border-color: var(--border2); }

  .main { margin-left: 240px; flex: 1; padding: 2.5rem; min-width: 0; }
  .page-section { display: none; }
  .page-section.active { display: block; }

  .page-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .section-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin-bottom: 1rem; }
  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; transition: border-color 0.2s; }
  .agent-card:hover { border-color: var(--border2); }
  .agent-icon { font-size: 24px; margin-bottom: 10px; }
  .agent-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .agent-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
  .agent-footer { display: flex; align-items: center; justify-content: space-between; }
  .agent-status { font-size: 11px; padding: 4px 10px; border-radius: 99px; }
  .agent-status.active { background: rgba(95,255,154,0.1); color: #5fff9a; border: 1px solid rgba(95,255,154,0.2); }
  .agent-btn { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: none; }
  .agent-btn:hover { opacity: 0.8; }

  .empty-state { text-align: center; padding: 4rem 2rem; }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
  .btn-main { background: var(--accent); color: #0a0a0a; font-family: var(--font-body); font-size: 14px; font-weight: 500; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.2s; }
  .btn-main:hover { background: var(--accent-dark); }

  table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  th { text-align: left; padding: 12px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 99px; }
  .status-badge.active { background: rgba(95,255,154,0.1); color: #5fff9a; border: 1px solid rgba(95,255,154,0.2); }
  .status-badge.cancelled { background: rgba(255,95,95,0.1); color: #ff5f5f; border: 1px solid rgba(255,95,95,0.2); }
  .empty-row td { text-align: center; color: var(--muted); padding: 2.5rem !important; }

  /* Welcome banner */
  .welcome-banner {
    background: linear-gradient(135deg, rgba(200,245,90,0.08) 0%, transparent 60%);
    border: 1px solid rgba(200,245,90,0.15); border-radius: 12px;
    padding: 1.5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;
  }
  .welcome-emoji { font-size: 36px; }
  .welcome-text h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .welcome-text p { font-size: 13px; color: var(--muted); }

  @media (max-width: 768px) {
    .main { margin-left: 0; padding: 1.5rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sya.js"></script>
</head>
<body>

<div class="sidebar">
  <a href="shop_your_agent.html" class="logo">Shop<span>Your</span>Agent</a>
  <button class="nav-item active" id="nav-agenti" onclick="showSection('agenti', this)"><span class="nav-icon">⚡</span> I miei agenti</button>
  <a class="nav-item" href="shop_your_agent.html#agenti"><span class="nav-icon">🛒</span> Catalogo</a>
  <button class="nav-item" id="nav-abbonamenti" onclick="showSection('abbonamenti', this)"><span class="nav-icon">💳</span> Abbonamenti</button>
  <a class="nav-item" href="impostazioni.html"><span class="nav-icon">⚙️</span> Impostazioni</a>
  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="avatar" id="avatar-initials">?</div>
      <div>
        <div class="user-name" id="user-name">Caricamento...</div>
        <div class="user-email" id="user-email"></div>
      </div>
    </div>
    <a class="logout-btn" onclick="signOut()">Esci</a>
  </div>
</div>

<div class="main">

  <!-- I MIEI AGENTI -->
  <div class="page-section active" id="section-agenti">
    <div class="page-title">I miei agenti</div>
    <div class="page-sub">Gestisci tutti gli agenti attivi nel tuo account</div>

    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Agenti attivi</div><div class="skel skel-text" style="height:32px;width:60%;margin-top:4px;"></div></div>
      <div class="stat-card"><div class="stat-label">Spesa mensile</div><div class="skel skel-text" style="height:32px;width:60%;margin-top:4px;"></div></div>
      <div class="stat-card"><div class="stat-label">Prossimo rinnovo</div><div class="skel skel-text" style="height:32px;width:60%;margin-top:4px;"></div></div>
    </div>

    <div id="agents-container">
      <div class="agents-grid" id="agents-skeleton">
        <!-- skeleton cards -->
      </div>
    </div>
  </div>

  <!-- ABBONAMENTI -->
  <div class="page-section" id="section-abbonamenti">
    <div class="page-title">Abbonamenti</div>
    <div class="page-sub">Storico completo di tutti i tuoi abbonamenti</div>
    <table>
      <thead>
        <tr>
          <th>Agente</th><th>Stato</th><th>Prezzo</th><th>Data inizio</th><th></th>
        </tr>
      </thead>
      <tbody id="subs-tbody">
        <tr class="empty-row"><td colspan="5">Caricamento...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  function showSection(name, el) {
    document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`section-${name}`).classList.add('active');
    if (el) el.classList.add('active');
  }

  async function init() {
    const session = await requireAuth();
    if (!session) return;

    const user = session.user;
    const email = user.email || '';
    document.getElementById('user-email').textContent = email;
    document.getElementById('avatar-initials').textContent = email.charAt(0).toUpperCase();

    // Show skeleton
    document.getElementById('agents-skeleton').innerHTML = skeletonCards(3);

    // Load profile
    const { data: profiles } = await db.from('profiles').select('nome, cognome').eq('user_id', user.id).limit(1);
    let displayName = '';
    if (profiles?.[0]) {
      displayName = `${profiles[0].nome} ${profiles[0].cognome}`;
      document.getElementById('user-name').textContent = displayName;
      document.getElementById('avatar-initials').textContent = profiles[0].nome?.charAt(0).toUpperCase() || email.charAt(0).toUpperCase();
    } else {
      const meta = user.user_metadata || {};
      if (meta.nome) {
        displayName = `${meta.nome} ${meta.cognome || ''}`.trim();
        document.getElementById('user-name').textContent = displayName;
        document.getElementById('avatar-initials').textContent = meta.nome.charAt(0).toUpperCase();
      }
    }

    // Load subscriptions
    const { data: subs } = await db
      .from('subscriptions')
      .select('*, agents(*)')
      .eq('user_id', user.id)
      .order('data_inizio', { ascending: false });


    const allSubs = subs || [];
    const activeSubs = allSubs.filter(s => s.stato === 'attiva');
    renderStats(activeSubs, displayName);
    renderAgentCards(activeSubs);
    renderSubsTable(allSubs);
  }

  function renderStats(subs, name) {
    let spesa = 0;
    let prossimo = null;
    subs.forEach(sub => {
      const a = sub.agents;
      if (!a) return;
      spesa += parseFloat(a.prezzo_mensile || 0);
      if (sub.data_inizio) {
        const r = new Date(sub.data_inizio);
        r.setMonth(r.getMonth() + 1);
        if (!prossimo || r < prossimo) prossimo = r;
      }
    });

    const statsRow = document.getElementById('stats-row');
    statsRow.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Agenti attivi</div>
        <div class="stat-val">${subs.length}</div>
        <div class="stat-sub">Su questo account</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Spesa mensile</div>
        <div class="stat-val">€${spesa.toFixed(0)}</div>
        <div class="stat-sub">Totale abbonamenti</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Prossimo rinnovo</div>
        <div class="stat-val">${prossimo ? prossimo.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' }) : '—'}</div>
        <div class="stat-sub">Data prossima fattura</div>
      </div>`;
  }

  function renderAgentCards(subs) {
    const container = document.getElementById('agents-container');
    if (!subs.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🤖</div>
          <div class="empty-title">Nessun agente ancora</div>
          <div class="empty-sub">Esplora il catalogo e attiva il tuo primo agente AI</div>
          <a href="shop_your_agent.html#agenti" class="btn-main">Esplora il catalogo</a>
        </div>`;
      return;
    }

    const cards = subs.map(sub => {
      const a = sub.agents;
      if (!a) return '';
      const cancelBtn = sub.stripe_subscription_id
        ? `<button onclick="cancelSubscription('${sub.stripe_subscription_id}')" class="agent-btn" style="color:var(--error);">Disdici</button>`
        : '';
      return `
        <div class="agent-card">
          <div class="agent-icon">${escHtml(a.icona || '🤖')}</div>
          <div class="agent-name">${escHtml(a.nome)}</div>
          <div class="agent-desc">${escHtml(a.descrizione_breve || a.descrizione || '')}</div>
          <div class="agent-footer">
            <span class="agent-status active">● Attivo</span>
            <div style="display:flex;gap:12px;align-items:center;">
              <a href="dettaglio-agente.html?id=${a.id}" class="agent-btn">Gestisci →</a>
              ${cancelBtn}
            </div>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `<div class="agents-grid">${cards}</div>`;
  }

  function renderSubsTable(subs) {
    const tbody = document.getElementById('subs-tbody');
    if (!subs.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Nessun abbonamento ancora</td></tr>';
      return;
    }
    tbody.innerHTML = subs.map(s => {
      const a = s.agents;
      const cls = s.stato === 'attiva' ? 'active' : 'cancelled';
      const label = s.stato === 'attiva' ? 'Attiva' : 'Annullata';
      return `<tr>
        <td><strong>${escHtml(a?.icona || '🤖')} ${escHtml(a?.nome || '—')}</strong></td>
        <td><span class="status-badge ${cls}">${label}</span></td>
        <td>€${a?.prezzo_mensile || 0}/mese</td>
        <td>${s.data_inizio ? new Date(s.data_inizio).toLocaleDateString('it-IT') : '—'}</td>
        <td>${a?.id ? `<a href="dettaglio-agente.html?id=${a.id}" class="agent-btn">Vedi →</a>` : '—'}</td>
      </tr>`;
    }).join('');
  }

  async function cancelSubscription(stripeSubId) {
    if (!confirm('Sei sicuro di voler disdire questo abbonamento? Mantieni l\'accesso fino alla fine del periodo pagato.')) return;

    const { data: { session } } = await db.auth.getSession();
    if (!session) return;

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/cancel-subscription`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
          'apikey': SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ stripeSubscriptionId: stripeSubId }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      showToast('Abbonamento disdetto. Accesso attivo fino a fine periodo.', 'info');
      setTimeout(() => init(), 1500);
    } catch (err) {
      showToast(err.message || 'Errore durante la disdetta', 'error');
    }
  }

  init();
</script>
</body>
</html>
